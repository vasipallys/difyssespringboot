services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DIFY_BASE_URL=${DIFY_BASE_URL:-https://api.dify.ai/v1}
      - DIFY_API_KEY=${DIFY_API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    networks:
      - dify-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Same-origin path when served behind the nginx reverse proxy;
        # use http://localhost:8080/api when hitting the backend directly.
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - dify-network
    restart: unless-stopped

  # Optional: Nginx reverse proxy for production (profile: production)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - dify-network
    restart: unless-stopped
    profiles:
      - production

networks:
  dify-network:
    driver: bridge
